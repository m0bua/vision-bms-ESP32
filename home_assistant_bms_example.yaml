  - binary_sensor:
      - name: BMS Warning Active
        unique_id: bms_warning_active
        state: "{{ state_attr('sensor.bms_raw', 'status').category == 'warning' }}"
      - name: BMS Protected Active
        unique_id: bms_protected_active
        state: "{{ state_attr('sensor.bms_raw', 'status').category == 'protected' }}"
      - name: BMS Status Active
        unique_id: bms_status_active
        state: "{{ state_attr('sensor.bms_raw', 'status').category == 'status' }}"
