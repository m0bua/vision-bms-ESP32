rest:
  - resource: http://192.168.0.50/json
    scan_interval: 10
    sensor:
      - name: BMS Raw
        unique_id: bms_raw
        value_template: "{{ value_json.status.category }}"
        json_attributes:
          - system
          - status
          - pack
          - temperatures
          - limits
          - cells
          - diagnostics

template:
  - sensor:
      - name: BMS Status
        unique_id: bms_status
        state: "{{ state_attr('sensor.bms_raw', 'status').category }}"
      - name: BMS Online
        unique_id: bms_online
        state: "{{ state_attr('sensor.bms_raw', 'status').online }}"
      - name: BMS Errors
        unique_id: bms_errors
        state: "{{ state_attr('sensor.bms_raw', 'system').errors }}"
      - name: BMS Active Slave ID
        unique_id: bms_active_slave_id
        state: "{{ state_attr('sensor.bms_raw', 'system').active_slave_id }}"
      - name: BMS Health
        unique_id: bms_health
        state: "{{ state_attr('sensor.bms_raw', 'status').health_text }}"
      - name: BMS Operating State
        unique_id: bms_operating_state
        state: "{{ state_attr('sensor.bms_raw', 'status').operating_text }}"
      - name: BMS Pack Voltage
        unique_id: bms_pack_voltage
        state: "{{ state_attr('sensor.bms_raw', 'pack').voltage_v }}"
        unit_of_measurement: "V"
        device_class: voltage
        state_class: measurement
      - name: BMS Current
        unique_id: bms_current
        state: "{{ state_attr('sensor.bms_raw', 'pack').current_a }}"
        unit_of_measurement: "A"
        device_class: current
        state_class: measurement
      - name: BMS SOC
        unique_id: bms_soc
        state: "{{ state_attr('sensor.bms_raw', 'pack').soc_pct }}"
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
      - name: BMS SOH
        unique_id: bms_soh
        state: "{{ state_attr('sensor.bms_raw', 'pack').soh_pct }}"
        unit_of_measurement: "%"
        state_class: measurement
      - name: BMS PCB Temperature
        unique_id: bms_temp_1
        state: "{{ state_attr('sensor.bms_raw', 'temperatures').pcb_c }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
      - name: BMS Cell Min Temperature
        unique_id: bms_temp_2
        state: "{{ state_attr('sensor.bms_raw', 'temperatures').cell_min_c }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
      - name: BMS Cell Max Temperature
        unique_id: bms_temp_3
        state: "{{ state_attr('sensor.bms_raw', 'temperatures').cell_max_c }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
      - name: BMS Remaining Ah
        unique_id: bms_remaining_ah
        state: "{{ state_attr('sensor.bms_raw', 'limits').remaining_ah }}"
        unit_of_measurement: "Ah"
        state_class: measurement
      - name: BMS Min Cell Voltage
        unique_id: bms_min_cell_voltage
        state: "{{ state_attr('sensor.bms_raw', 'cells').min_v }}"
        unit_of_measurement: "V"
